<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Chat &amp; Voice</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Hidden audio element for remote voice playback -->
    <audio id="remote-audio" autoplay></audio>

    <div id="app">
        <!-- Join Screen -->
        <div id="join-screen" class="screen active">
            <div class="glass-card">
                <h1>Secure P2P Chat</h1>
                <p>End-to-end encrypted WebRTC connection</p>
                <div class="input-group">
                    <input type="text" id="room-input" placeholder="Enter Room Code" autocomplete="off">
                </div>
                <button id="join-btn" class="primary-btn">Join Room</button>
                <div id="status-msg" class="status-msg"></div>
            </div>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen" class="screen">
            <div class="chat-container glass-card">
                <div class="chat-header">
                    <h2>Room: <span id="room-display"></span></h2>
                    <span id="connection-status" class="status-badge connecting">Connecting...</span>
                </div>

                <!-- Voice Channel Bar -->
                <div id="voice-bar" class="voice-bar">
                    <div class="voice-bar-left">
                        <button id="voice-call-btn" class="voice-btn call-btn" disabled title="Start Voice Call">
                            <!-- Phone icon -->
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                            </svg>
                            <span id="voice-call-label">Voice</span>
                        </button>
                        <button id="voice-mute-btn" class="voice-btn mute-btn" disabled title="Mute Microphone" style="display:none;">
                            <!-- Mic icon -->
                            <svg id="mic-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                <line x1="12" y1="19" x2="12" y2="23"></line>
                                <line x1="8" y1="23" x2="16" y2="23"></line>
                            </svg>
                            <!-- Mic-off icon (hidden by default) -->
                            <svg id="mic-off-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                                <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path>
                                <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .76-.13 1.49-.35 2.17"></path>
                                <line x1="12" y1="19" x2="12" y2="23"></line>
                                <line x1="8" y1="23" x2="16" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="voice-bar-center">
                        <div id="voice-status" class="voice-status">Voice channel ready</div>
                        <div id="voice-timer" class="voice-timer" style="display:none;">00:00</div>
                    </div>
                    <div class="voice-bar-right">
                        <div id="audio-visualizer" class="audio-visualizer" style="display:none;">
                            <span class="viz-bar"></span>
                            <span class="viz-bar"></span>
                            <span class="viz-bar"></span>
                            <span class="viz-bar"></span>
                            <span class="viz-bar"></span>
                        </div>
                    </div>
                </div>

                <div id="chat-box" class="chat-box">
                    <div class="system-msg">Waiting for peer to connect...</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="message-input" placeholder="Type a message..." disabled autocomplete="off">
                    <button id="send-btn" class="primary-btn" disabled>
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
